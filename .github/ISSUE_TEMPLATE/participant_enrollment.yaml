name: Participant Enrollment
description: Submit a request for participant enrollment or unenrollment
title: "[Participant Enrollment]: "
labels: ["participant-enrollment"]
body:
  
  - type: dropdown
    id: reason
    attributes:
      label: Reason
      description: Select the reason for this request
      options:
        - "-- select one --"
        - New Participant Enrollment
        - Unenroll Participant
    validations:
      required: true
      
  - type: input
    id: participant-key
    attributes:
      label: Participant Key
      placeholder: Enter the participant key...
    validations:
      required: true

  - type: dropdown
    id: time-frame
    attributes:
      label: Time Frame
      description: Select the time frame
      options:
        - "-- select one --"
        - 2025-2026 (2026)
        - 2026-2027 (2027)
    validations:
      required: true

  - type: input
    id: program-name
    attributes:
      label: Program Name
      placeholder: Enter the program name...
    validations:
      required: true

  - type: dropdown
    id: program-supplier
    attributes:
      label: Program Supplier
      options:
        - "-- select one --"
        - bayer
        - corteva
        - syngenta
        - winfield
        - rosens
        - chs
        - amvac
        - basf
        - fmc
        - upl
        - valent
        - helena
        - gowan
        - albaugh
        - atticus
        - van_diest
        - cni
        - nutrien
        - simplot
        - iap
    validations:
      required: true

  - type: textarea
    id: other-details
    attributes:
      label: Other Details
      placeholder: Enter any additional details...
    validations:
      required: false
