name: Fix Failure
description: Submit a request to fix a failure
title: "[Fix Failure]: "
labels: ["fix-failure"]
body:
  - type: dropdown
    id: reason
    attributes:
      label: Reason
      description: Select the reason for this request
      options:
        - "-- select one --"
        - Example Failure
        - Superseded SKU Used
    validations:
      required: true

  - type: dropdown
    id: time-frame
    attributes:
      label: Time Frame
      description: Select the time frame
      options:
        - "-- select one --"
        - 2025-2026 (2026)
        - 2026-2027 (2027)
    validations:
      required: true

  - type: input
    id: program-name
    attributes:
      label: Program Name
      placeholder: Enter the program name...
    validations:
      required: true

  - type: dropdown
    id: program-supplier
    attributes:
      label: Program Supplier
      description: Select the program supplier
      options:
        - "-- select one --"
        - bayer
        - corteva
        - syngenta
        - winfield
        - rosens
        - chs
        - amvac
        - basf
        - fmc
        - upl
        - valent
        - helena
        - gowan
        - albaugh
        - atticus
        - van_diest
        - cni
        - nutrien
        - simplot
        - iap
    validations:
      required: true

  - type: textarea
    id: other-details
    attributes:
      label: Other Details
      placeholder: Enter any additional details, link to failure, etc...
    validations:
      required: true
